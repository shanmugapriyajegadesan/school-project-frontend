<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us - CHITTI SCHOOL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
<link rel="stylesheet" href="./style.css">
<style>
:root {
    --primary: #1E293B;
    --accent: #F59E0B;
    --white: #ffffff;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Poppins", sans-serif;
    padding-top: 140px; /* prevents navbar overlap */
}

header {
    text-align: center;
    padding: 20px;
    font-size: 26px;
    color: var(--accent);
}

.contact-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
}

.form-box, .info-box {
    background: #f9fafb;
    padding: 20px;
    border-radius: 15px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: #f1f5f9;
}

button {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: white;
}

.map {
    width: 100%;
    height: 300px;
    border-radius: 15px;
    overflow: hidden;
}

/* FOOTER */
footer{
    background:#070f24;
    text-align:center;
    padding:30px 15px;
}

footer h3, footer p{
    color:#94A3B8;
}

.social i{
    margin:0 10px;
    color:#94A3B8;
    cursor:pointer;
}

.social i:hover{
    color:var(--accent);
}
</style>
</head>

<body>

<div id="navbar"></div>
<header>Contact Us</header>

<div class="contact-container">

<div class="form-box">
    <h2>Send Message</h2>
    <form id="contactForm">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="5" placeholder="Your Message" required></textarea>
        <button type="submit">Submit</button>
    </form>
</div>

<div class="info-box">
    <h2>School Info</h2>
    <p>📍 Address: Madurai, Tamil Nadu</p>
    <p>📞 Phone: +91 9876543210</p>
    <p>📧 Email: school@email.com</p>

    <div class="map">
        <iframe src="https://www.google.com/maps?q=Madurai&output=embed"></iframe>
    </div>
</div>

</div>

<!-- FOOTER -->
<footer>
    <h3>Our School</h3>
    <p>© 2026 All Rights Reserved</p>

    <div class="social">
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-twitter"></i>
    </div>
</footer>

<script>
// Mobile menu
const menuBtn = document.getElementById("menuBtn");
const navLinks = document.getElementById("navLinks");

menuBtn.addEventListener("click", () => {
    navLinks.classList.toggle("active");
});

// Form
document.getElementById("contactForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("Message sent successfully ✅");
    this.reset();
});
</script>
<script src="./script.js"></script>
</body>
</html>

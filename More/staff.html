<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Directory</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    
    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: white;
            color: #F59E0B;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        #navbar {
            position: relative;
            z-index: 999;
        }

        .main-content {
            flex: 1;
            width: 90%;
            max-width: 1000px;
            margin: 120px auto 50px auto;
            text-align: center;
        }

        p, small {
            color: #CBD5F5;
        }

        .top-bar {
            background: #1E293B; 
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #search {
            padding: 12px 20px;
            width: 100%;
            max-width: 500px;
            border-radius: 25px;
            border: 2px solid #E2E8F0;
            margin-bottom: 40px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        #search:focus {
            border-color: #F59E0B;
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .card {
            background: linear-gradient(145deg, #1E293B, #0F172A);
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #F59E0B;
        }

        /* STAFF IMAGE STYLING */
        .staff-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #F59E0B;
            background: #334155;
        }

        .popup-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 4px solid #F59E0B;
        }

        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000; 
        }

        .popup-content {
            background: #1E293B;
            padding: 30px;
            border-radius: 15px;
            min-width: 320px;
            text-align: center;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .hidden { display: none !important; }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #F59E0B;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        footer {
            background: #070f24;
            text-align: center;
            padding: 30px 15px;
            margin-top: auto;
            width: 100%;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

<body>
    <div id="navbar"></div>
    
    <div class="main-content">
        <div class="top-bar">
            <h1>School Staff Directory</h1>
            <p>School Code: <b>SC-1024</b> | Level: Staff Hub</p>
        </div>

        <input type="text" id="search" placeholder="🔍 Search staff..." onkeyup="filterStaff()"/>

        <div id="grid" class="grid"></div>
    </div>

    <div id="popup" class="popup hidden">
        <div class="popup-content">
            <img id="pimg" class="popup-img" src="" alt="Staff">
            <h2 id="pname"></h2>
            <p id="prole"></p>
            <p id="pdept"></p>
            <button onclick="closePopup()">Close Profile</button>
        </div>
    </div>

    <footer>
        <h3>Our School</h3>
        <p>© 2026 All Rights Reserved | Education is Power</p>
        <div class="social">
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-twitter"></i>
            <i class="fa-brands fa-youtube"></i>
        </div>
    </footer>

    <script>
        // Updated data with Image URLs
        const staff = [
            { name: "John Peter", role: "Principal", dept: "Admin", img: "https://randomuser.me/api/portraits/men/1.jpg" },
            { name: "Mary John", role: "Math Teacher", dept: "Mathematics", img: "https://randomuser.me/api/portraits/women/2.jpg" },
            { name: "Samuel Raj", role: "Physics Teacher", dept: "Science", img: "https://randomuser.me/api/portraits/men/3.jpg" },
            { name: "Anita Sharma", role: "English Teacher", dept: "Languages", img: "https://randomuser.me/api/portraits/women/4.jpg" },
            { name: "David Kumar", role: "Lab Assistant", dept: "Science Lab", img: "https://randomuser.me/api/portraits/men/5.jpg" }
        ];

        const grid = document.getElementById("grid");

        function loadStaff(data) {
            grid.innerHTML = "";
            if (data.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1;'>No staff found.</p>";
                return;
            }

            data.forEach(s => {
                const div = document.createElement("div");
                div.className = "card";
                div.innerHTML = `
                    <img src="${s.img}" class="staff-img" alt="${s.name}">
                    <h3>${s.name}</h3>
                    <p>${s.role}</p>
                    <small>${s.dept}</small>
                `;
                div.onclick = () => showPopup(s);
                grid.appendChild(div);
            });
        }

        function showPopup(s) {
            document.getElementById("pimg").src = s.img;
            document.getElementById("pname").innerText = s.name;
            document.getElementById("prole").innerText = "Role: " + s.role;
            document.getElementById("pdept").innerText = "Dept: " + s.dept;
            document.getElementById("popup").classList.remove("hidden");
        }

        function closePopup() {
            document.getElementById("popup").classList.add("hidden");
        }

        function filterStaff() {
            const val = document.getElementById("search").value.toLowerCase();
            const filtered = staff.filter(s =>
                s.name.toLowerCase().includes(val) ||
                s.role.toLowerCase().includes(val) ||
                s.dept.toLowerCase().includes(val)
            );
            loadStaff(filtered);
        }

        loadStaff(staff);
    </script>
    <script src="../script.js"></script>
</body>
</html>

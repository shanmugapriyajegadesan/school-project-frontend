<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Gallery Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --primary: #F59E0B;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-muted: #94A3B8;
        }

        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: #ffffff;
            color: var(--primary);
            
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
h1, .subtitle{
  text-align: center;
}
        h1 {
            margin-top: 150px;
            font-weight: 600;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
        }

        /* GALLERY LAYOUT */
        .gallery {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 40px;
            scroll-snap-type: x mandatory;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .gallery::-webkit-scrollbar {
            height: 8px;
        }

        .gallery::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        /* CARDS */
        .card {
            min-width: 300px;
            height: 200px;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            scroll-snap-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #eee;
        }

        .card:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 35px rgba(245, 158, 11, 0.3);
            z-index: 2;
        }

        .card img, .card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* PLAY OVERLAY */
        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .card:hover .video-overlay {
            background: rgba(0,0,0,0.1);
        }

        .play-btn {
            font-size: 50px;
            color: white;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        /* POPUP MODAL */
        .popup {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .popup-content {
            width: 90%;
            max-width: 900px;
            position: relative;
        }

        .popup img, .popup video {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .close {
            position: absolute;
            top: -50px;
            right: 0;
            color: white;
            font-size: 35px;
            cursor: pointer;
            transition: 0.3s;
        }

        .close:hover { color: var(--primary); }

        /* FOOTER */
        footer {
            background: var(--dark-bg);
            padding: 40px 20px;
            margin-top: auto;
            color: white;
            text-align: center;
        }

        footer h3 { margin-bottom: 5px; color: var(--primary); }
        footer p { font-size: 14px; color: var(--text-muted); }

        .social { margin-top: 20px; }
        .social i {
            margin: 0 15px;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.3s;
        }
        .social i:hover { color: var(--primary); transform: translateY(-5px); }
    </style>
</head>

<body>
    <div id="navbar"></div>
    
    <h1><i class="fa-solid fa-graduation-cap"></i> School Gallery</h1>
    <p class="subtitle">Explore our moments • Scroll horizontally to view more</p>

    <div class="gallery" id="gallery"></div>

    <div class="popup" id="popup">
        <div class="popup-content">
            <span class="close" onclick="closePopup()"><i class="fa-solid fa-xmark"></i></span>
            <div id="popupBody"></div>
        </div>
    </div>

    <footer>
        <h3>Our School</h3>
        <p>© 2026 All Rights Reserved | Education is Power</p>
        <div class="social">
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-twitter"></i>
            <i class="fa-brands fa-youtube"></i>
        </div>
    </footer>

    <script>
        const data = [
            {type:"image", src:"https://images.unsplash.com/photo-1503676260728-1c00da094a0b"},
            {type:"image", src:"https://images.unsplash.com/photo-1524178232363-1fb2b075b655"},
            {type:"video", src:"https://www.w3schools.com/html/mov_bbb.mp4"},
            {type:"image", src:"https://images.unsplash.com/photo-1521412644187-c49fa049e84d"},
            {type:"video", src:"https://www.w3schools.com/html/movie.mp4"},
            {type:"image", src:"https://images.unsplash.com/photo-1503428593586-e225b39bddfe"}
        ];

        const gallery = document.getElementById("gallery");

        function load() {
            gallery.innerHTML = data.map((item, index) => `
                <div class="card" onclick="openMedia(${index})">
                    ${item.type === 'image' 
                        ? `<img src="${item.src}" alt="Gallery Image">` 
                        : `<video muted><source src="${item.src}"></video>
                           <div class="video-overlay"><i class="fa-solid fa-circle-play play-btn"></i></div>`
                    }
                </div>
            `).join('');
        }

        function openMedia(index) {
            const item = data[index];
            const popup = document.getElementById("popup");
            const body = document.getElementById("popupBody");

            if(item.type === "image") {
                body.innerHTML = `<img src="${item.src}">`;
            } else {
                body.innerHTML = `
                    <video controls autoplay id="activeVideo">
                        <source src="${item.src}">
                    </video>`;
            }
            popup.style.display = "flex";
            document.body.style.overflow = "hidden"; // Disable scroll when open
        }

        function closePopup() {
            const popup = document.getElementById("popup");
            const video = document.getElementById("activeVideo");
            
            // Stop video playback on close
            if(video) {
                video.pause();
                video.src = ""; 
            }
            
            popup.style.display = "none";
            document.body.style.overflow = "auto";
        }

        // Close on clicking outside the content
        window.onclick = function(event) {
            const popup = document.getElementById("popup");
            if (event.target == popup) {
                closePopup();
            }
        }

        load();
    </script>
    <script src="../script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Form</title>
<link rel="stylesheet" href="../style.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg,var(--bg1),var(--bg2));
    color:#F1F5F9;
}

.form-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 80px); /* 80px is approx navbar height */
    padding: 140px 20px;
}
/* MAIN CARD */
.application-container{
    background:#1E293B;
    width:90%;
    max-width:800px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    margin:0;
    font-size:32px;
    color: #F1F5F9;
}

.header p{
    color:#CBD5f5;
    font-size:14px;
}

/* GRID */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* FULL WIDTH */
.full{
    grid-column:1/3;
}

/* INPUT BOX */
.input-box{
    display:flex;
    flex-direction:column;
}

.input-box label{
    font-size:18px;
    margin-bottom:6px;
    color:#e2a90c;
}

.input-box input,
.input-box select,
.input-box textarea{
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    outline:none;
    font-size:14px;
    transition:0.3s;
}

/* FOCUS EFFECT */
.input-box input:focus,
.input-box select:focus,
.input-box textarea:focus{
    border-color:#4f46e5;
    box-shadow:0 0 8px rgba(79,70,229,0.2);
}

/* ERROR */
.error{
    font-size:12px;
    color:red;
}

/* BUTTON */
button{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    /* background: linear-gradient(90deg,#4f46e5,#14b8a6); */
    color:#1E293B;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    background: #F59E0B;
}

button:hover{
    transform:scale(1.03);
    background:  #F1F5F9;
}

/* SUCCESS */
.success{
    text-align:center;
    margin-top:15px;
    color: #22C55E;
}

/* RESPONSIVE */
@media(max-width:600px){
    .form-grid{
        grid-template-columns:1fr;
    }
    .full{
        grid-column:1/2;
    }
}
</style>

</head>
<body>
<div id="navbar"></div>
<div class="form-wrapper">
<div class="application-container">

<div class="header">
    <h1>Admission Form</h1>
    <p>Fill the form below to apply for school admission</p>
</div>

<form id="form">

<div class="form-grid">

<div class="input-box">
<label>Student Name</label>
<input type="text" id="name" required>
<div class="error" id="nameError"></div>
</div>

<div class="input-box">
<label>Date of Birth</label>
<input type="date" id="dob" required>
</div>

<div class="input-box">
<label>Class Applying</label>
<select id="class" required>
<option value="">Select</option>
<option>Pre-KG</option>
<option>LKG</option>
<option>UKG</option>
<option>Grade 1</option>
<option>Grade 2</option>
</select>
</div>

<div class="input-box">
<label>Parent Name</label>
<input type="text" id="parent" required>
</div>

<div class="input-box">
<label>Phone Number</label>
<input type="tel" id="phone" required>
<div class="error" id="phoneError"></div>
</div>

<div class="input-box">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="input-box full">
<label>Address</label>
<textarea id="address" rows="3" required></textarea>
</div>

</div>

<button type="submit">Submit Application</button>

<div class="success" id="successMsg"></div>

</form>
</div>
</div>
<script>
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    let valid = true;

    if(name.length < 3){
        document.getElementById("nameError").innerText="Enter valid name";
        valid=false;
    }else{
        document.getElementById("nameError").innerText="";
    }

    if(phone.length != 10){
        document.getElementById("phoneError").innerText="Enter 10 digit number";
        valid=false;
    }else{
        document.getElementById("phoneError").innerText="";
    }

    if(valid){
        document.getElementById("successMsg").innerText="Application Submitted Successfully!";
    }
});
</script>
<script src="../script.js"></script>
</body>
</html>
